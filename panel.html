<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Panel</title>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/MotionPathPlugin.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/elkjs@0.9.3/lib/elk.bundled.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0c;--surface:#131318;--border:#252530;--muted:#555568;
  --text:#e0e0ea;--blue:#4a9eff;--red:#ff4455;--green:#3ecf8e;
  --purple:#c084fc;--orange:#f0a000;--yellow:#f97316;
  --mono:"Cascadia Code","Fira Code","Consolas",monospace;
  --fs:11px;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--mono);
  font-size:var(--fs);width:100vw;height:100vh;overflow:hidden;color-scheme:dark}

#canvas{position:absolute;inset:0;overflow:auto;padding-bottom:150px;
  background:radial-gradient(circle,#1a1a24 1px,transparent 1px),var(--bg);
  background-size:20px 20px}

svg#wires{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}
svg .wire{pointer-events:none}

.ic{position:absolute;background:var(--surface);border:2px solid var(--border);
  border-radius:4px;display:flex;flex-direction:column;min-width:160px;
  touch-action:none;cursor:grab;z-index:2;transition:border-color .3s;
  will-change:transform;transform:translate3d(0,0,0)}
.ic.active{border-color:var(--blue)}
.ic.err{border-color:var(--red)}
.ic-head{padding:4px 8px;background:#1a1a22;border-bottom:1px solid var(--border);
  font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
  display:flex;align-items:center;gap:6px;user-select:none}
.ic-head .ic-icon{font-size:11px}
.ic-head .ic-name{flex:1}
.ic-head .ic-ts{font-size:7px;color:var(--muted)}
.ic-pins{display:flex;justify-content:space-between;padding:0 2px}
.ic-pins-left,.ic-pins-right{display:flex;flex-direction:column;gap:2px;padding:2px 0}
.pin{font-size:7px;color:var(--muted);padding:1px 4px;display:flex;align-items:center;gap:3px;
  white-space:nowrap}
.pin .dot{width:5px;height:5px;border-radius:50%;background:var(--border);flex-shrink:0;
  transition:background .2s}
.pin .dot.on{background:var(--green)}
.pin .dot.err{background:var(--red)}
.ic-body{padding:4px;display:flex;flex-direction:column;gap:3px;font-size:8px}

.ic-imgs{display:flex;gap:2px;min-height:0}
.ic-img-slot{flex:1;position:relative;background:var(--bg);border:1px solid var(--border);
  border-radius:2px;overflow:hidden;min-height:40px;display:flex;align-items:center;
  justify-content:center;cursor:pointer}
.ic-img-slot img{max-width:100%;max-height:100%;object-fit:contain;display:none}
.ic-img-slot .tag{position:absolute;top:1px;left:3px;font-size:6px;color:var(--muted);
  text-transform:uppercase;pointer-events:none}
.ic-img-slot .ph{color:var(--border);font-size:7px}

.ic-pane{padding:2px 4px;font-size:8px;line-height:1.4;white-space:pre-wrap;
  word-break:break-word;border-top:1px solid var(--border);max-height:120px;overflow-y:auto}
.ic-pane.sys{color:#a78bfa;background:rgba(167,139,250,0.04)}
.ic-pane.usr{color:#60a5fa;background:rgba(96,165,250,0.04)}
.ic-pane.reply{color:#34d399;background:rgba(52,211,153,0.04)}
.ic-pane-label{font-size:6px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;
  padding:1px 4px}
.ic-pane .ph{color:var(--border)}

.fr-badge{display:inline-block;font-size:6px;padding:0 4px;border-radius:2px;
  margin-left:4px;font-weight:700}
.fr-badge.stop{background:rgba(52,211,153,0.2);color:var(--green)}
.fr-badge.length{background:rgba(255,68,85,0.2);color:var(--red)}
.fr-badge.error{background:rgba(255,68,85,0.3);color:var(--red)}
.fr-badge.unknown{background:rgba(136,136,160,0.2);color:#8888a0}

.group-box{position:absolute;border:1.5px dashed var(--border);border-radius:8px;
  background:rgba(19,19,24,0.5);z-index:1;pointer-events:none;
  will-change:transform;transform:translate3d(0,0,0)}
.group-label{position:absolute;top:-10px;left:8px;font-size:7px;font-weight:700;
  color:var(--muted);text-transform:uppercase;letter-spacing:.06em;
  background:var(--bg);padding:0 4px}

#trace{position:fixed;bottom:0;left:0;right:0;height:140px;background:var(--surface);
  border-top:2px solid var(--border);z-index:10;display:flex;flex-direction:column}
#trace-head{display:flex;align-items:center;gap:8px;padding:3px 8px;
  background:#1a1a22;border-bottom:1px solid var(--border);font-size:9px;
  font-weight:700;color:var(--muted);user-select:none;flex-shrink:0}
#trace-head .dot{width:7px;height:7px;border-radius:50%;background:var(--red);
  transition:background .3s}
#trace-head .dot.live{background:var(--green)}
#trace-body{flex:1;overflow-y:auto;overflow-x:hidden}
.tr{display:flex;gap:6px;padding:1px 8px;border-bottom:1px solid #111118;font-size:8px;
  align-items:baseline;cursor:pointer;min-height:16px}
.tr:hover{background:rgba(74,158,255,0.06)}
.tr.hl{background:rgba(74,158,255,0.12)}
.tr.err{color:var(--red)}
.tr-t{color:var(--muted);flex-shrink:0;width:58px}
.tr-e{color:var(--blue);flex-shrink:0;width:100px}
.tr-a{color:var(--green);flex-shrink:0;width:55px}
.tr-l{color:#b0b0c0;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-f{color:#666680;font-size:7px;flex-basis:100%;padding-left:58px;white-space:pre-wrap;
  word-break:break-all}

#replay-bar{display:none;align-items:center;gap:6px;padding:2px 8px;
  background:#0e0e12;border-bottom:1px solid var(--border);flex-shrink:0}
#replay-bar button{background:var(--surface);border:1px solid var(--border);color:var(--text);
  font-family:var(--mono);font-size:9px;padding:2px 8px;border-radius:3px;cursor:pointer}
#replay-bar button:hover{border-color:var(--blue)}
#replay-bar input[type=range]{flex:1;accent-color:var(--blue)}
#replay-bar .speed-label{font-size:8px;color:var(--muted);min-width:40px}

#img-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);
  display:none;z-index:1000;align-items:center;justify-content:center;cursor:zoom-out}
#img-overlay img{max-width:95vw;max-height:95vh;object-fit:contain}

.wire-label{font-size:7px;fill:var(--muted);pointer-events:none}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>
<div id="canvas">
  <svg id="wires" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="ah" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
        <polygon points="0 0,7 2.5,0 5" fill="#555568"/></marker>
      <marker id="ah-b" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
        <polygon points="0 0,7 2.5,0 5" fill="#4a9eff"/></marker>
      <marker id="ah-r" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
        <polygon points="0 0,7 2.5,0 5" fill="#ff4455"/></marker>
      <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
  </svg>
</div>

<div id="trace">
  <div id="trace-head">
    <span class="dot" id="cdot"></span>
    <span>SIGNAL TRACE</span>
    <span style="flex:1"></span>
    <span id="entry-count" style="font-size:8px;color:var(--muted)">0 entries</span>
  </div>
  <div id="replay-bar">
    <button id="btn-prev">◀ STEP</button>
    <button id="btn-play">▶ PLAY</button>
    <button id="btn-next">STEP ▶</button>
    <input type="range" id="scrubber" min="0" max="0" value="0"/>
    <button id="btn-slower">−</button>
    <span class="speed-label" id="speed-label">1×</span>
    <button id="btn-faster">+</button>
  </div>
  <div id="trace-body"></div>
</div>

<div id="img-overlay"><img id="img-overlay-img" alt=""/></div>

<script type="module">
gsap.registerPlugin(MotionPathPlugin);

const PANEL = location.protocol === 'file:' ? 'http://127.0.0.1:1236' : '';
const NORM = 1000;
const BRAIN_COLOR = '#a3e635';
const POLL_INTERVAL_MS = 3000;
const REPLAY_BASE_MS = 500;
const FLASH_DURATION_MS = 800;
const IC_ACTIVE_DURATION_MS = 1000;
const IC_ERR_DURATION_MS = 2000;
const MARKER_RESET_MS = 1400;
const WIRE_FLASH_DURATION = 0.15;
const WIRE_FADE_DURATION = 1.2;
const DOT_TRAVEL_DURATION = 1.2;
const DOT_FADE_DURATION = 0.5;
const LABEL_FADE_DELAY = 1;
const LABEL_FADE_DURATION = 2;
const LAYOUT_PAD = 30;
const GROUP_PAD = 12;
const MIN_SVG_W = 800;
const MIN_SVG_H = 600;
const WIRE_STROKE = '#25253060';
const WIRE_STROKE_WIDTH = 1.5;
const WIRE_FLASH_WIDTH = 3;
const DOT_RADIUS = 4;
const DOT_OPACITY = 0.9;
const REPLAY_MAX_SPEED = 16;
const REPLAY_MIN_SPEED = 0.25;

const PHYS_DAMPING = 0.88;
const PHYS_SPRING = 0.04;
const PHYS_DRAG_SPRING = 0.15;
const PHYS_SETTLE_THRESHOLD = 0.1;
const PHYS_OSCILLATE_IMPULSE = 3;
const PHYS_MAX_VELOCITY = 12;

const $canvas = document.getElementById('canvas');
const $wires = document.getElementById('wires');
const $traceBody = document.getElementById('trace-body');
const $cdot = document.getElementById('cdot');
const $overlay = document.getElementById('img-overlay');
const $overlayImg = document.getElementById('img-overlay-img');
const $entryCount = document.getElementById('entry-count');
const $replayBar = document.getElementById('replay-bar');
const $scrubber = document.getElementById('scrubber');
const $speedLabel = document.getElementById('speed-label');

const ics = new Map();
const edges = new Map();
const groups = new Map();
const allEntries = [];
const agentState = new Map();
const pendingAnnotations = new Set();
let isLive = false;
let pollCursor = {batch: '', line: 0};
let allBatches = [];
let elk = null;
let layoutDirty = false;
let replayIdx = 0;
let replayPlaying = false;
let replaySpeed = 1;
let physicsRunning = false;

try { elk = new ELK(); } catch(e) { console.error('ELK init failed:', e); }

function compType(id) {
  if (id.startsWith('brain.') || id === 'brain') return 'brain';
  if (id === 'panel' || id === 'vlm' || id === 'win32' || id === 'browser') return id;
  return 'brain';
}

function compColor(id) {
  const colors = {panel:'#4a9eff', vlm:'#f97316', win32:'#3ecf8e', browser:'#c084fc'};
  const t = compType(id);
  return t === 'brain' ? BRAIN_COLOR : (colors[t] || '#888');
}

function compIcon(id) {
  const icons = {panel:'📡', vlm:'🤖', win32:'🖥️', browser:'🌐'};
  const t = compType(id);
  return t === 'brain' ? '🧠' : (icons[t] || '⊡');
}

function groupKey(id) {
  return id.startsWith('brain.') ? 'brain_group' : null;
}

function clampVel(v) {
  return Math.max(-PHYS_MAX_VELOCITY, Math.min(PHYS_MAX_VELOCITY, v));
}

function ensureIC(id) {
  if (ics.has(id)) return ics.get(id);
  const color = compColor(id);
  const icon = compIcon(id);
  const el = document.createElement('div');
  el.className = 'ic';
  el.style.borderColor = color;
  el.dataset.icId = id;

  const head = document.createElement('div');
  head.className = 'ic-head';
  head.innerHTML = `<span class="ic-icon">${icon}</span><span class="ic-name" style="color:${color}">${id}</span><span class="ic-ts"></span>`;

  const pinsRow = document.createElement('div');
  pinsRow.className = 'ic-pins';
  const pinsL = document.createElement('div');
  pinsL.className = 'ic-pins-left';
  const pinsR = document.createElement('div');
  pinsR.className = 'ic-pins-right';
  pinsRow.append(pinsL, pinsR);

  const body = document.createElement('div');
  body.className = 'ic-body';

  el.append(head, pinsRow, body);
  $canvas.appendChild(el);

  const ic = {id, el, x: 0, y: 0, tx: 0, ty: 0, vx: 0, vy: 0,
    w: 180, h: 60, color, pinsL, pinsR, body, dragging: false,
    tsEl: head.querySelector('.ic-ts'), pins: new Map(), agentData: null};
  ics.set(id, ic);
  layoutDirty = true;

  let dragOffX = 0, dragOffY = 0;
  head.addEventListener('pointerdown', e => {
    ic.dragging = true;
    dragOffX = e.clientX - ic.x + $canvas.scrollLeft;
    dragOffY = e.clientY - ic.y + $canvas.scrollTop;
    head.setPointerCapture(e.pointerId);
    e.preventDefault();
  });
  head.addEventListener('pointermove', e => {
    if (!ic.dragging) return;
    ic.tx = e.clientX - dragOffX + $canvas.scrollLeft;
    ic.ty = e.clientY - dragOffY + $canvas.scrollTop;
    startPhysics();
  });
  head.addEventListener('pointerup', () => {
    if (ic.dragging) {
      ic.dragging = false;
      ic.vx += (Math.random() - 0.5) * PHYS_OSCILLATE_IMPULSE;
      ic.vy += (Math.random() - 0.5) * PHYS_OSCILLATE_IMPULSE;
      startPhysics();
    }
  });

  el.addEventListener('click', e => {
    if (e.target.closest('.ic-img-slot')) return;
    highlightByComponent(id);
  });

  const gk = groupKey(id);
  if (gk && !groups.has(gk)) {
    const gEl = document.createElement('div');
    gEl.className = 'group-box';
    const gLabel = document.createElement('div');
    gLabel.className = 'group-label';
    gLabel.textContent = 'BRAIN PROCESS';
    gLabel.style.color = BRAIN_COLOR;
    gEl.style.borderColor = BRAIN_COLOR + '40';
    gEl.appendChild(gLabel);
    $canvas.insertBefore(gEl, $canvas.firstChild);
    groups.set(gk, {el: gEl, members: new Set()});
  }
  if (gk) groups.get(gk).members.add(id);

  return ic;
}

function startPhysics() {
  if (physicsRunning) return;
  physicsRunning = true;
  requestAnimationFrame(physicsTick);
}

function physicsTick() {
  let anyMoving = false;

  for (const [, ic] of ics) {
    const spring = ic.dragging ? PHYS_DRAG_SPRING : PHYS_SPRING;
    const dx = ic.tx - ic.x;
    const dy = ic.ty - ic.y;

    ic.vx = clampVel((ic.vx + dx * spring) * PHYS_DAMPING);
    ic.vy = clampVel((ic.vy + dy * spring) * PHYS_DAMPING);

    ic.x += ic.vx;
    ic.y += ic.vy;

    ic.el.style.left = ic.x + 'px';
    ic.el.style.top = ic.y + 'px';

    if (Math.abs(ic.vx) > PHYS_SETTLE_THRESHOLD ||
        Math.abs(ic.vy) > PHYS_SETTLE_THRESHOLD ||
        Math.abs(dx) > PHYS_SETTLE_THRESHOLD ||
        Math.abs(dy) > PHYS_SETTLE_THRESHOLD) {
      anyMoving = true;
    }
  }

  rebuildWires();
  updateGroups();

  if (anyMoving) {
    requestAnimationFrame(physicsTick);
  } else {
    for (const [, ic] of ics) {
      ic.vx = 0;
      ic.vy = 0;
      ic.x = ic.tx;
      ic.y = ic.ty;
      ic.el.style.left = ic.x + 'px';
      ic.el.style.top = ic.y + 'px';
    }
    rebuildWires();
    updateGroups();
    physicsRunning = false;
  }
}

function nudgeAll() {
  for (const [, ic] of ics) {
    ic.vx += (Math.random() - 0.5) * PHYS_OSCILLATE_IMPULSE * 0.5;
    ic.vy += (Math.random() - 0.5) * PHYS_OSCILLATE_IMPULSE * 0.5;
  }
  startPhysics();
}

function ensurePin(icId, side, name) {
  const ic = ics.get(icId);
  if (!ic) return;
  const key = `${side}:${name}`;
  if (ic.pins.has(key)) return;
  const container = side === 'left' ? ic.pinsL : ic.pinsR;
  const pin = document.createElement('div');
  pin.className = 'pin';
  const dot = document.createElement('span');
  dot.className = 'dot';
  const lbl = document.createElement('span');
  lbl.textContent = name;
  if (side === 'left') pin.append(dot, lbl);
  else pin.append(lbl, dot);
  container.appendChild(pin);
  ic.pins.set(key, {el: pin, dot, name, side});
}

function flashPin(icId, side, name, isErr) {
  const ic = ics.get(icId);
  if (!ic) return;
  const key = `${side}:${name}`;
  const p = ic.pins.get(key);
  if (!p) return;
  p.dot.classList.add(isErr ? 'err' : 'on');
  setTimeout(() => { p.dot.classList.remove('on', 'err'); }, FLASH_DURATION_MS);
}

function updateGroups() {
  for (const [, g] of groups) {
    if (g.members.size === 0) continue;
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const mid of g.members) {
      const m = ics.get(mid);
      if (!m) continue;
      minX = Math.min(minX, m.x);
      minY = Math.min(minY, m.y);
      maxX = Math.max(maxX, m.x + m.el.offsetWidth);
      maxY = Math.max(maxY, m.y + m.el.offsetHeight);
    }
    g.el.style.left = (minX - GROUP_PAD) + 'px';
    g.el.style.top = (minY - GROUP_PAD) + 'px';
    g.el.style.width = (maxX - minX + GROUP_PAD * 2) + 'px';
    g.el.style.height = (maxY - minY + GROUP_PAD * 2) + 'px';
  }
}

function ensureAgentBody(ic) {
  if (ic.agentData) return ic.agentData;
  const imgs = document.createElement('div');
  imgs.className = 'ic-imgs';
  const mkSlot = tag => {
    const s = document.createElement('div');
    s.className = 'ic-img-slot';
    const t = document.createElement('span');
    t.className = 'tag'; t.textContent = tag;
    const img = document.createElement('img'); img.alt = '';
    const ph = document.createElement('span');
    ph.className = 'ph'; ph.textContent = '—';
    s.append(t, img, ph);
    s.addEventListener('click', () => {
      if (img.src && img.style.display !== 'none') {
        $overlayImg.src = img.src; $overlay.style.display = 'flex';
      }
    });
    return {el: s, img, ph};
  };
  const rawS = mkSlot('RAW');
  const vlmS = mkSlot('VLM');
  imgs.append(rawS.el, vlmS.el);

  const mkPane = (cls, label) => {
    const l = document.createElement('div');
    l.className = 'ic-pane-label'; l.textContent = label;
    const p = document.createElement('div');
    p.className = 'ic-pane ' + cls;
    p.innerHTML = '<span class="ph">—</span>';
    return {lbl: l, pane: p};
  };
  const sysP = mkPane('sys', 'SYS');
  const usrP = mkPane('usr', 'USR');
  const replyP = mkPane('reply', 'REPLY');

  ic.body.append(imgs, sysP.lbl, sysP.pane, usrP.lbl, usrP.pane, replyP.lbl, replyP.pane);

  ic.agentData = {rawImg: rawS.img, rawPh: rawS.ph, vlmImg: vlmS.img, vlmPh: vlmS.ph,
    pSys: sysP.pane, pUsr: usrP.pane, pReply: replyP.pane};
  return ic.agentData;
}

function showImg(imgEl, phEl, src) {
  imgEl.style.display = 'block'; phEl.style.display = 'none'; imgEl.src = src;
}

function setPane(el, text) {
  el.textContent = '';
  if (text) el.textContent = text;
  else { const ph = document.createElement('span'); ph.className = 'ph'; ph.textContent = '—'; el.appendChild(ph); }
}

function setReplyPane(el, text, fr) {
  setPane(el, text);
  if (fr) {
    const b = document.createElement('span');
    b.className = 'fr-badge ' + (fr === 'stop' ? 'stop' : fr === 'length' ? 'length' : fr === 'error' ? 'error' : 'unknown');
    b.textContent = fr;
    el.appendChild(b);
  }
}

function updateAgentState(agent, entry) {
  if (!agentState.has(agent)) agentState.set(agent, {});
  const st = agentState.get(agent);
  const flds = entry.fields || {};
  const event = entry.event || '';

  if (event === 'capture_done' && entry.image) st.raw_image = entry.image;
  else if (event === 'vlm_forward') {
    st.system_prompt = flds.system_prompt || st.system_prompt || '';
    st.user_message = flds.user_message || st.user_message || '';
    if (entry.image) st.vlm_image = entry.image;
    st.vlm_reply = ''; st.finish_reason = '';
  } else if (event === 'vlm_response') {
    st.vlm_reply = flds.vlm_reply || '';
    st.finish_reason = entry.finish_reason || '';
  } else if (event === 'annotate_done' && entry.image) st.vlm_image = entry.image;
  else if (event === 'capture_failed' || event === 'capture_empty') st.last_error = entry.label || event;
  else if (event === 'annotate_timeout') st.last_error = entry.label || 'annotate timeout';
  else if (event === 'vlm_error') {
    st.last_error = entry.label || 'vlm error';
    st.vlm_reply = flds.error_body || flds.error_text || '';
    st.finish_reason = 'error';
  }

  renderAgentIC(agent, st);
}

function renderAgentIC(agent, st) {
  const icId = 'brain.' + agent;
  const ic = ics.get(icId);
  if (!ic) return;
  const ad = ensureAgentBody(ic);
  ic.tsEl.textContent = new Date().toLocaleTimeString('en-GB', {hour12: false});
  if (st.raw_image) showImg(ad.rawImg, ad.rawPh, `${PANEL}/images/${st.raw_image}`);
  if (st.vlm_image) showImg(ad.vlmImg, ad.vlmPh, `${PANEL}/images/${st.vlm_image}`);
  setPane(ad.pSys, st.system_prompt || '');
  setPane(ad.pUsr, st.user_message || '');
  setReplyPane(ad.pReply, st.vlm_reply || '', st.finish_reason || '');
  if (st.last_error) {
    ic.el.classList.add('err');
    setTimeout(() => ic.el.classList.remove('err'), IC_ERR_DURATION_MS);
    st.last_error = '';
  }
}

function edgeKey(from, to) { return `${from}→${to}`; }

function ensureEdge(fromId, toId) {
  const key = edgeKey(fromId, toId);
  if (!edges.has(key)) {
    edges.set(key, {from: fromId, to: toId, pathEl: null, labelEl: null, lastEvent: ''});
    layoutDirty = true;
  }
  return edges.get(key);
}

function rebuildWires() {
  $wires.querySelectorAll('path.wire, text.wire-label').forEach(p => p.remove());
  const ns = 'http://www.w3.org/2000/svg';
  for (const [key, e] of edges) {
    const fi = ics.get(e.from);
    const ti = ics.get(e.to);
    if (!fi || !ti) continue;
    const fw = fi.el.offsetWidth || fi.w;
    const fh = fi.el.offsetHeight || fi.h;
    const th = ti.el.offsetHeight || ti.h;
    const ax = fi.x + fw;
    const ay = fi.y + fh / 2;
    const bx = ti.x;
    const by = ti.y + th / 2;
    const mx = (ax + bx) / 2;
    const path = document.createElementNS(ns, 'path');
    path.classList.add('wire');
    path.setAttribute('d', `M ${ax} ${ay} C ${mx} ${ay}, ${mx} ${by}, ${bx} ${by}`);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', WIRE_STROKE);
    path.setAttribute('stroke-width', String(WIRE_STROKE_WIDTH));
    path.setAttribute('marker-end', 'url(#ah)');
    path.dataset.key = key;
    $wires.appendChild(path);
    e.pathEl = path;

    if (e.lastEvent) {
      const txt = document.createElementNS(ns, 'text');
      txt.classList.add('wire-label');
      txt.setAttribute('x', String(mx));
      txt.setAttribute('y', String((ay + by) / 2 - 4));
      txt.setAttribute('text-anchor', 'middle');
      txt.textContent = e.lastEvent;
      $wires.appendChild(txt);
      e.labelEl = txt;
    }
  }
  const maxX = Math.max(MIN_SVG_W, ...Array.from(ics.values()).map(ic => ic.x + (ic.el.offsetWidth || 200) + 40));
  const maxY = Math.max(MIN_SVG_H, ...Array.from(ics.values()).map(ic => ic.y + (ic.el.offsetHeight || 100) + 40));
  $wires.setAttribute('width', String(maxX));
  $wires.setAttribute('height', String(maxY));
}

function flashEdge(key, isErr, eventLabel) {
  const e = edges.get(key);
  if (!e || !e.pathEl) return;
  e.lastEvent = eventLabel || '';
  const col = isErr ? '#ff4455' : '#4a9eff';
  const marker = isErr ? 'url(#ah-r)' : 'url(#ah-b)';
  gsap.to(e.pathEl, {attr: {stroke: col, 'stroke-width': WIRE_FLASH_WIDTH}, duration: WIRE_FLASH_DURATION,
    onComplete: () => gsap.to(e.pathEl, {attr: {stroke: WIRE_STROKE, 'stroke-width': WIRE_STROKE_WIDTH}, duration: WIRE_FADE_DURATION})});
  e.pathEl.setAttribute('marker-end', marker);
  setTimeout(() => { if (e.pathEl) e.pathEl.setAttribute('marker-end', 'url(#ah)'); }, MARKER_RESET_MS);

  if (e.labelEl) {
    e.labelEl.textContent = eventLabel || '';
    gsap.fromTo(e.labelEl, {opacity: 1}, {opacity: 0, duration: LABEL_FADE_DURATION, delay: LABEL_FADE_DELAY});
  }

  const fi = ics.get(e.from);
  const ti = ics.get(e.to);
  if (fi) { fi.el.classList.add(isErr ? 'err' : 'active');
    setTimeout(() => fi.el.classList.remove('active', 'err'), IC_ACTIVE_DURATION_MS); }
  if (ti) { ti.el.classList.add(isErr ? 'err' : 'active');
    setTimeout(() => ti.el.classList.remove('active', 'err'), IC_ACTIVE_DURATION_MS); }

  if (e.pathEl) {
    const ns = 'http://www.w3.org/2000/svg';
    const dot = document.createElementNS(ns, 'circle');
    dot.setAttribute('r', String(DOT_RADIUS));
    dot.setAttribute('fill', col);
    dot.setAttribute('opacity', String(DOT_OPACITY));
    dot.setAttribute('filter', 'url(#glow)');
    $wires.appendChild(dot);
    gsap.to(dot, {
      motionPath: {path: e.pathEl, align: e.pathEl, alignOrigin: [0.5, 0.5]},
      duration: DOT_TRAVEL_DURATION, ease: 'power1.inOut',
      onComplete: () => gsap.to(dot, {opacity: 0, duration: DOT_FADE_DURATION,
        onComplete: () => { try { $wires.removeChild(dot); } catch(ex) { console.error('dot remove:', ex); } }})
    });
  }

  nudgeAll();
}

async function doLayout() {
  if (!elk || ics.size === 0) return;
  const graph = {
    id: 'root',
    layoutOptions: {
      'elk.algorithm': 'layered',
      'elk.direction': 'RIGHT',
      'elk.spacing.nodeNode': '50',
      'elk.layered.spacing.nodeNodeBetweenLayers': '80',
    },
    children: [],
    edges: [],
  };
  for (const [id, ic] of ics) {
    const w = ic.el.offsetWidth || 180;
    const h = ic.el.offsetHeight || 60;
    graph.children.push({id, width: w, height: h});
  }
  let ei = 0;
  for (const [, e] of edges) {
    graph.edges.push({id: `e${ei++}`, sources: [e.from], targets: [e.to]});
  }
  try {
    const result = await elk.layout(graph);
    for (const child of result.children || []) {
      const ic = ics.get(child.id);
      if (!ic) continue;
      ic.tx = child.x + LAYOUT_PAD;
      ic.ty = child.y + LAYOUT_PAD;
      if (ic.x === 0 && ic.y === 0) {
        ic.x = ic.tx;
        ic.y = ic.ty;
        ic.el.style.left = ic.x + 'px';
        ic.el.style.top = ic.y + 'px';
      }
      ic.vx += (Math.random() - 0.5) * PHYS_OSCILLATE_IMPULSE;
      ic.vy += (Math.random() - 0.5) * PHYS_OSCILLATE_IMPULSE;
    }
    startPhysics();
  } catch(e) { console.error('ELK layout error:', e); }
}

function pinNameForEvent(event, side) {
  const map = {
    route: side === 'from' ? 'route_out' : 'route_in',
    capture_done: side === 'from' ? 'capture_out' : 'capture_in',
    capture_failed: side === 'from' ? 'capture_out' : 'capture_in',
    capture_empty: side === 'from' ? 'capture_out' : 'capture_in',
    annotate_request: side === 'from' ? 'annotate_out' : 'annotate_in',
    annotate_done: side === 'from' ? 'result_out' : 'result_in',
    annotate_timeout: side === 'from' ? 'timeout' : 'timeout_in',
    vlm_forward: side === 'from' ? 'vlm_out' : 'vlm_in',
    vlm_response: side === 'from' ? 'vlm_out' : 'vlm_in',
    vlm_error: side === 'from' ? 'vlm_out' : 'vlm_in',
    action_dispatch: side === 'from' ? 'device_out' : 'device_in',
    device_done: side === 'from' ? 'device_out' : 'device_in',
    result_received: side === 'from' ? 'result_out' : 'result_in',
    sse_connect: side === 'from' ? 'sse' : 'sse',
    sse_disconnect: side === 'from' ? 'sse' : 'sse',
    overlay_store_put: side === 'from' ? 'store_out' : 'store_in',
    overlay_store_get: side === 'from' ? 'store_out' : 'store_in',
    overlay_store_clear: side === 'from' ? 'store_out' : 'store_in',
  };
  return map[event] || event;
}

function eventLabel(d) {
  let lbl = d.event || '';
  if (d.duration) lbl += ` ${d.duration}s`;
  if (d.tokens) lbl += ` ${d.tokens}tok`;
  if (d.image) lbl += ' 📷';
  return lbl;
}

function formatTs(ts) {
  if (typeof ts !== 'number') return '';
  const d = new Date(ts * 1000);
  return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}:${d.getSeconds().toString().padStart(2,'0')}.${Math.floor(d.getMilliseconds()/10).toString().padStart(2,'0')}`;
}

function addTraceRow(d, idx) {
  const row = document.createElement('div');
  row.className = 'tr' + (d.error ? ' err' : '');
  row.dataset.idx = idx;
  row.dataset.rid = d.request_id || '';
  row.dataset.from = d.from || '';
  row.dataset.to = d.to || '';

  const ts = document.createElement('span');
  ts.className = 'tr-t'; ts.textContent = formatTs(d.ts);
  const ev = document.createElement('span');
  ev.className = 'tr-e'; ev.textContent = d.event || '';
  const ag = document.createElement('span');
  ag.className = 'tr-a'; ag.textContent = d.agent || '';
  const lbl = document.createElement('span');
  lbl.className = 'tr-l'; lbl.textContent = eventLabel(d);
  row.append(ts, ev, ag, lbl);

  if (d.fields && Object.keys(d.fields).length > 0) {
    const f = document.createElement('div');
    f.className = 'tr-f'; f.textContent = JSON.stringify(d.fields);
    row.appendChild(f);
  }

  row.addEventListener('click', () => highlightByRid(d.request_id || '', idx));

  $traceBody.appendChild(row);
  $traceBody.scrollTop = $traceBody.scrollHeight;
  $entryCount.textContent = `${allEntries.length} entries`;
}

function highlightByRid(rid, clickedIdx) {
  $traceBody.querySelectorAll('.tr.hl').forEach(r => r.classList.remove('hl'));
  if (!rid) return;
  $traceBody.querySelectorAll(`.tr[data-rid="${rid}"]`).forEach(r => r.classList.add('hl'));
  const entry = allEntries[clickedIdx];
  if (entry) {
    const from = entry.from || '';
    const to = entry.to || '';
    if (from && to && from !== to) {
      flashEdge(edgeKey(from, to), !!entry.error, eventLabel(entry));
    }
  }
}

function highlightByComponent(compId) {
  $traceBody.querySelectorAll('.tr.hl').forEach(r => r.classList.remove('hl'));
  $traceBody.querySelectorAll('.tr').forEach(r => {
    if (r.dataset.from === compId || r.dataset.to === compId) r.classList.add('hl');
  });
}

const drawPoly = (ctx, ov, w, h) => {
  const pts = (ov.points||[]).map(p => [(p[0]||0)*w/NORM, (p[1]||0)*h/NORM]);
  if (pts.length === 0) return;
  ctx.save();
  if (pts.length >= 2) {
    ctx.beginPath(); ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
    if (ov.closed) ctx.closePath();
    if (ov.fill) { ctx.fillStyle = ov.fill; ctx.fill(); }
    if (ov.stroke) { ctx.strokeStyle = ov.stroke; ctx.lineWidth = ov.stroke_width||1;
      ctx.lineJoin = 'round'; ctx.lineCap = 'round'; ctx.stroke(); }
  }
  if (ov.label && pts.length > 0) {
    let cx = 0, cy = 0;
    for (const p of pts) { cx += p[0]; cy += p[1]; }
    cx /= pts.length; cy /= pts.length;
    const fs = Math.max(10, Math.min(w, h) * 0.025);
    ctx.font = `bold ${fs}px system-ui,sans-serif`;
    const tw = ctx.measureText(ov.label).width;
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(cx - tw/2 - 3, cy - fs/2 - 3, tw + 6, fs + 6);
    ctx.fillStyle = ov.stroke || '#ffffff';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(ov.label, cx, cy);
  }
  ctx.restore();
};

async function renderAnnotated(imageSrc, overlays) {
  const img = await new Promise((res, rej) => {
    const i = new Image(); i.onload = () => res(i);
    i.onerror = () => rej(new Error(`image load failed: ${imageSrc}`));
    i.crossOrigin = 'anonymous'; i.src = imageSrc;
  });
  const oc = new OffscreenCanvas(img.naturalWidth, img.naturalHeight);
  const ctx = oc.getContext('2d');
  ctx.drawImage(img, 0, 0);
  for (const ov of overlays) drawPoly(ctx, ov, img.naturalWidth, img.naturalHeight);
  const blob = await oc.convertToBlob({type: 'image/png'});
  const reader = new FileReader();
  return new Promise((res, rej) => {
    reader.onload = () => res(reader.result.split(',')[1]);
    reader.onerror = () => rej(new Error('FileReader failed in renderAnnotated'));
    reader.readAsDataURL(blob);
  });
}

async function handleAnnotation(rid) {
  try {
    const resp = await fetch(`${PANEL}/annotate-request?rid=${rid}`);
    if (!resp.ok) { console.error(`annotate-request ${rid} failed: ${resp.status}`); pendingAnnotations.delete(rid); return; }
    const data = await resp.json();
    const imageSrc = `${PANEL}/images/${data.image}`;
    const overlays = data.overlays || [];
    let resultB64;
    if (overlays.length > 0) {
      resultB64 = await renderAnnotated(imageSrc, overlays);
    } else {
      const imgResp = await fetch(imageSrc);
      if (!imgResp.ok) throw new Error(`image fetch failed: ${imgResp.status}`);
      const blob = await imgResp.blob();
      const reader = new FileReader();
      resultB64 = await new Promise((res, rej) => {
        reader.onload = () => res(reader.result.split(',')[1]);
        reader.onerror = () => rej(new Error('FileReader failed'));
        reader.readAsDataURL(blob);
      });
    }
    if (!resultB64) throw new Error('annotation produced empty base64');
    const postResp = await fetch(`${PANEL}/result`, {method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({request_id: rid, image_b64: resultB64})});
    if (!postResp.ok) console.error(`POST /result ${rid} failed: ${postResp.status}`);
  } catch(e) { console.error(`handleAnnotation ${rid} error:`, e); }
  pendingAnnotations.delete(rid);
}

function processEntry(d) {
  const fromComp = d.from || '';
  const toComp = d.to || '';
  const event = d.event || '';
  const agent = d.agent || '';
  const isErr = !!d.error;

  if (fromComp) {
    ensureIC(fromComp);
    ensurePin(fromComp, 'right', pinNameForEvent(event, 'from'));
    flashPin(fromComp, 'right', pinNameForEvent(event, 'from'), isErr);
  }
  if (toComp) {
    ensureIC(toComp);
    ensurePin(toComp, 'left', pinNameForEvent(event, 'to'));
    flashPin(toComp, 'left', pinNameForEvent(event, 'to'), isErr);
  }
  if (fromComp && toComp && fromComp !== toComp) {
    ensureEdge(fromComp, toComp);
    flashEdge(edgeKey(fromComp, toComp), isErr, eventLabel(d));
  }

  const idx = allEntries.length;
  allEntries.push(d);
  addTraceRow(d, idx);
  $scrubber.max = String(allEntries.length - 1);
  $scrubber.value = String(allEntries.length - 1);

  if (agent) updateAgentState(agent, d);

  if (event === 'annotate_request' && isLive) {
    const rid = d.request_id || '';
    if (rid && !pendingAnnotations.has(rid)) {
      pendingAnnotations.add(rid);
      handleAnnotation(rid);
    }
  }
}

async function fetchBatches() {
  try {
    const resp = await fetch(`${PANEL}/logs`);
    if (!resp.ok) { console.error('fetchBatches failed:', resp.status); return; }
    const data = await resp.json();
    allBatches = data.batches || [];
  } catch(e) { console.error('fetchBatches error:', e); }
}

let _pollBusy = false;
let _pollAgain = false;
async function pollLogs() {
  if (_pollBusy) { _pollAgain = true; return; }
  _pollBusy = true;
  try { await _pollLogsInner(); } finally {
    _pollBusy = false;
    if (_pollAgain) { _pollAgain = false; pollLogs(); }
  }
}

async function _pollLogsInner() {
  if (allBatches.length === 0) {
    await fetchBatches();
    if (allBatches.length === 0) return;
    pollCursor.batch = allBatches[0];
    pollCursor.line = 0;
  }

  try {
    const resp = await fetch(`${PANEL}/logs?batch=${pollCursor.batch}&after=${pollCursor.line}`);
    if (!resp.ok) { console.error('pollLogs fetch failed:', resp.status); return; }
    const data = await resp.json();
    const lines = data.lines || [];

    for (const entry of lines) {
      processEntry(entry);
      pollCursor.line++;
    }

    if (lines.length === 0) {
      await fetchBatches();
      const curIdx = allBatches.indexOf(pollCursor.batch);
      if (curIdx >= 0 && curIdx < allBatches.length - 1) {
        pollCursor.batch = allBatches[curIdx + 1];
        pollCursor.line = 0;
      }
    }
  } catch(e) { console.error('pollLogs error:', e); }

  if (layoutDirty) {
    layoutDirty = false;
    await doLayout();
  }
}

$overlay.addEventListener('click', () => { $overlay.style.display = 'none'; });

const es = new EventSource(`${PANEL}/events`);
es.addEventListener('connected', () => {
  $cdot.classList.add('live');
  isLive = true;
  pollLogs();
});
es.addEventListener('update', () => { pollLogs(); });
es.onerror = () => {
  $cdot.classList.remove('live');
  isLive = false;
  $replayBar.style.display = 'flex';
};

setInterval(() => { pollLogs(); }, POLL_INTERVAL_MS);

function replayFlashAndScroll(idx) {
  const d = allEntries[idx];
  if (!d) return;
  const from = d.from || '';
  const to = d.to || '';
  if (from && to && from !== to) flashEdge(edgeKey(from, to), !!d.error, eventLabel(d));
  const row = $traceBody.querySelector(`.tr[data-idx="${idx}"]`);
  if (row) { row.classList.add('hl'); row.scrollIntoView({block: 'nearest'}); }
}

document.getElementById('btn-play').addEventListener('click', () => {
  replayPlaying = !replayPlaying;
  document.getElementById('btn-play').textContent = replayPlaying ? '⏸ PAUSE' : '▶ PLAY';
  if (replayPlaying) replayStep();
});

document.getElementById('btn-next').addEventListener('click', () => {
  if (replayIdx < allEntries.length) {
    highlightByRid(allEntries[replayIdx].request_id || '', replayIdx);
    replayFlashAndScroll(replayIdx);
    replayIdx++;
    $scrubber.value = String(replayIdx);
  }
});

document.getElementById('btn-prev').addEventListener('click', () => {
  if (replayIdx > 0) {
    replayIdx--;
    $scrubber.value = String(replayIdx);
    highlightByRid(allEntries[replayIdx].request_id || '', replayIdx);
    replayFlashAndScroll(replayIdx);
  }
});

$scrubber.addEventListener('input', () => {
  replayIdx = parseInt($scrubber.value);
  if (replayIdx < allEntries.length) {
    highlightByRid(allEntries[replayIdx].request_id || '', replayIdx);
  }
});

document.getElementById('btn-faster').addEventListener('click', () => {
  replaySpeed = Math.min(replaySpeed * 2, REPLAY_MAX_SPEED);
  $speedLabel.textContent = replaySpeed + '×';
});

document.getElementById('btn-slower').addEventListener('click', () => {
  replaySpeed = Math.max(replaySpeed / 2, REPLAY_MIN_SPEED);
  $speedLabel.textContent = replaySpeed + '×';
});

function replayStep() {
  if (!replayPlaying) return;
  if (replayIdx < allEntries.length) {
    replayFlashAndScroll(replayIdx);
    replayIdx++;
    $scrubber.value = String(replayIdx);
  }
  if (replayIdx < allEntries.length) {
    setTimeout(replayStep, REPLAY_BASE_MS / replaySpeed);
  } else {
    replayPlaying = false;
    document.getElementById('btn-play').textContent = '▶ PLAY';
  }
}

new ResizeObserver(() => { if (ics.size > 0) doLayout(); }).observe($canvas);

</script>
